services:
  db:
    image: postgres:16
    container_name: it_monitoring_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: it_monitoring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  interested-service:
    build: .
    working_dir: /app/interested_service
    ports:
      - "5001:5001"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@db:5432/it_monitoring_db
    depends_on:
      - db

  device-service:
    build: .
    working_dir: /app/device_service
    ports:
      - "5002:5002"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@db:5432/it_monitoring_db
    depends_on:
      - db

  auth-service:
    build: .
    working_dir: /app/auth_service
    ports:
      - "5003:5003"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@db:5432/it_monitoring_db
    depends_on:
      - db

  location-service:
    build: .
    working_dir: /app/location_service
    ports:
      - "5004:5004"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@db:5432/it_monitoring_db
    depends_on:
      - db

  metrics-service:
    build: .
    working_dir: /app/metrics_service
    ports:
      - "5005:5005"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@db:5432/it_monitoring_db
    depends_on:
      - db

  alerts-service:
    build: .
    working_dir: /app/alerts_service
    ports:
      - "5006:5006"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:12345@db:5432/it_monitoring_db
    depends_on:
      - db

  gateway:
    build: .
    working_dir: /app/gateway
    ports:
      - "5000:5000"
    environment:
      INTERESTED_URL: http://interested-service:5001/interested
      DEVICES_URL: http://device-service:5002/devices
      AUTH_URL: http://auth-service:5003/auth
      LOCATIONS_URL: http://location-service:5004/locations
      METRICS_URL: http://metrics-service:5005/metrics
      ALERTS_URL: http://alerts-service:5006/alerts
    depends_on:
      - interested-service
      - device-service
      - auth-service
      - location-service
      - metrics-service
      - alerts-service

volumes:
  postgres_data: